name: Windows Manual Build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
          - both
      package:
        description: "Generate CPack ZIP/NSIS when available"
        required: false
        default: false
        type: boolean

jobs:
  build_manual:
    name: Manual ${{ matrix.config }} x64
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Release
          - config: Debug

    steps:
      - name: Select mode
        id: mode
        shell: pwsh
        run: |
          $mode = '${{ inputs.mode }}'
          $config = '${{ matrix.config }}'
          $run = $false
          if ($mode -eq 'both') {
            $run = $true
          } elseif ($mode -eq 'x64-release' -and $config -eq 'Release') {
            $run = $true
          } elseif ($mode -eq 'x64-debug' -and $config -eq 'Debug') {
            $run = $true
          }
          "run=$($run.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Checkout
        if: ${{ steps.mode.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Build and test with CMake
        if: ${{ steps.mode.outputs.run == 'true' }}
        shell: pwsh
        run: |
          .\run_windows_tests.ps1 -Configuration ${{ matrix.config }} -Platform x64 -Toolset auto -Package:${{ inputs.package }}

      - name: Upload binaries
        if: ${{ steps.mode.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: djvulibre-windows-${{ matrix.config }}-x64
          path: |
            build-windows/bin/${{ matrix.config }}/libdjvulibre.dll
            build-windows/lib/${{ matrix.config }}/libdjvulibre.lib
            build-windows/bin/${{ matrix.config }}/*.exe
            build-windows/*.zip
            build-windows/*.exe
          if-no-files-found: ignore
