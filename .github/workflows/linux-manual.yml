name: Linux Manual Build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
      run_tests:
        description: "Run libdjvu_gtest"
        required: false
        default: true
        type: boolean
      enable_gtest:
        description: "Enable GoogleTest-based tests"
        required: false
        default: true
        type: boolean

jobs:
  build_manual:
    name: Manual ${{ inputs.mode }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            g++ \
            make \
            libjpeg-dev \
            zlib1g-dev \
            libtiff-dev \
            libgtest-dev

      - name: Configure
        shell: bash
        run: |
          mode='${{ inputs.mode }}'
          run_tests='${{ inputs.run_tests }}'
          enable_gtest='${{ inputs.enable_gtest }}'

          cfg_flags=(--disable-nsdejavu --disable-desktopfiles)
          if [[ "$mode" == "x64-debug" ]]; then
            cfg_flags+=(--enable-debug)
            export CXXFLAGS="-O0 -g3"
            export CFLAGS="-O0 -g3"
          else
            export CXXFLAGS="-O2 -DNDEBUG"
            export CFLAGS="-O2 -DNDEBUG"
          fi

          if [[ "$enable_gtest" == "true" ]]; then
            cfg_flags+=(--enable-gtest)
          fi

          ./autogen.sh "${cfg_flags[@]}"

      - name: Build
        run: |
          make -j"$(nproc)"
          if [ "${{ inputs.enable_gtest }}" = "true" ]; then
            make -j"$(nproc)" -C tests libdjvu_gtest
          fi

      - name: Test
        if: ${{ inputs.run_tests && inputs.enable_gtest }}
        run: |
          set -o pipefail
          ./tests/libdjvu_gtest --gtest_color=yes 2>&1 | tee tests/libdjvu_gtest.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-manual-test-logs-${{ github.run_number }}
          path: |
            tests/libdjvu_gtest.log
          if-no-files-found: ignore
