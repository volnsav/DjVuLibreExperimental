name: Linux Manual Build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
      run_tests:
        description: "Run ctest"
        required: false
        default: true
        type: boolean
      enable_gtest:
        description: "Enable GoogleTest-based tests"
        required: false
        default: true
        type: boolean

jobs:
  build_manual:
    name: Manual ${{ inputs.mode }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            g++ \
            libjpeg-dev \
            libtiff-dev \
            zlib1g-dev \
            libgtest-dev

      - name: Configure
        shell: bash
        run: |
          build_type=Release
          if [[ '${{ inputs.mode }}' == 'x64-debug' ]]; then
            build_type=Debug
          fi

          enable_gtest=OFF
          if [[ '${{ inputs.enable_gtest }}' == 'true' ]]; then
            enable_gtest=ON
          fi

          cmake -S . -B build-ci -G Ninja \
            -DCMAKE_BUILD_TYPE="${build_type}" \
            -DDJVULIBRE_ENABLE_GTEST="${enable_gtest}" \
            -DDJVULIBRE_ENABLE_XMLTOOLS=ON \
            -DDJVULIBRE_ENABLE_DESKTOPFILES=OFF

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Test
        if: ${{ inputs.run_tests }}
        run: |
          set -o pipefail
          ctest --test-dir build-ci --output-on-failure 2>&1 | tee build-ci/ctest.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-manual-test-logs-${{ github.run_number }}
          path: build-ci/ctest.log
          if-no-files-found: ignore
