name: Linux Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
      run_tests:
        description: "Run test suite (make check)"
        required: false
        default: true
        type: boolean
      enable_gtest:
        description: "Enable GoogleTest-based tests"
        required: false
        default: true
        type: boolean

jobs:
  build_pr:
    name: Release x64 + tests
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            g++ \
            make \
            libjpeg-dev \
            zlib1g-dev \
            libtiff-dev \
            libgtest-dev

      - name: Configure (Release, gtest enabled)
        run: |
          ./autogen.sh --disable-nsdejavu --disable-desktopfiles --enable-gtest

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Test
        run: |
          make -j"$(nproc)" check

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs
          path: |
            tests/test-suite.log
            tests/*.log
            tests/*.trs
          if-no-files-found: ignore

  build_manual:
    name: Manual ${{ github.event.inputs.mode }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            g++ \
            make \
            libjpeg-dev \
            zlib1g-dev \
            libtiff-dev \
            libgtest-dev

      - name: Configure
        shell: bash
        run: |
          mode='${{ github.event.inputs.mode }}'
          run_tests='${{ github.event.inputs.run_tests }}'
          enable_gtest='${{ github.event.inputs.enable_gtest }}'

          cfg_flags=(--disable-nsdejavu --disable-desktopfiles)
          if [[ "$mode" == "x64-debug" ]]; then
            cfg_flags+=(--enable-debug)
            export CXXFLAGS="-O0 -g3"
            export CFLAGS="-O0 -g3"
          else
            export CXXFLAGS="-O2 -DNDEBUG"
            export CFLAGS="-O2 -DNDEBUG"
          fi

          if [[ "$enable_gtest" == "true" ]]; then
            cfg_flags+=(--enable-gtest)
          fi

          ./autogen.sh "${cfg_flags[@]}"

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Test
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: |
          make -j"$(nproc)" check

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-manual-test-logs-${{ github.run_number }}
          path: |
            tests/test-suite.log
            tests/*.log
            tests/*.trs
          if-no-files-found: ignore
