name: Linux Build

on:
  push:
    branches:
      - develop
      - master
  pull_request:

jobs:
  build_pr:
    name: ${{ matrix.mode }} + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - x64-release
          - x64-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            g++ \
            make \
            libjpeg-dev \
            zlib1g-dev \
            libtiff-dev \
            libgtest-dev

      - name: Configure
        run: |
          cfg_flags=(--disable-nsdejavu --disable-desktopfiles --enable-gtest)
          if [[ "${{ matrix.mode }}" == "x64-debug" ]]; then
            cfg_flags+=(--enable-debug)
            export CXXFLAGS="-O0 -g3"
            export CFLAGS="-O0 -g3"
          else
            export CXXFLAGS="-O2 -DNDEBUG"
            export CFLAGS="-O2 -DNDEBUG"
          fi

          ./autogen.sh "${cfg_flags[@]}"

      - name: Build
        run: |
          make -j"$(nproc)"
          make -j"$(nproc)" -C tests libdjvu_gtest

      - name: Test
        run: |
          set -o pipefail
          ./tests/libdjvu_gtest --gtest_color=yes 2>&1 | tee tests/libdjvu_gtest.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs-${{ matrix.mode }}
          path: |
            tests/libdjvu_gtest.log
          if-no-files-found: ignore
