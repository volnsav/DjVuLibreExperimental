name: Linux Build

on:
  push:
    branches:
      - develop
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build_pr:
    name: ${{ matrix.mode }} + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - x64-release
          - x64-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            g++ \
            libjpeg-dev \
            libtiff-dev \
            zlib1g-dev \
            libgtest-dev

      - name: Configure
        run: |
          build_type=Release
          if [[ "${{ matrix.mode }}" == "x64-debug" ]]; then
            build_type=Debug
          fi

          cmake -S . -B build-ci -G Ninja \
            -DCMAKE_BUILD_TYPE="${build_type}" \
            -DDJVULIBRE_ENABLE_GTEST=ON \
            -DDJVULIBRE_ENABLE_XMLTOOLS=ON \
            -DDJVULIBRE_ENABLE_DESKTOPFILES=OFF

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Test
        run: |
          set -o pipefail
          ctest --test-dir build-ci --output-on-failure 2>&1 | tee build-ci/ctest.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs-${{ matrix.mode }}
          path: build-ci/ctest.log
          if-no-files-found: ignore
