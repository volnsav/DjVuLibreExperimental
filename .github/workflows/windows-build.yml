name: Windows Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
          - both

jobs:
  build_pr:
    name: Release x64
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect MSVC toolset
        id: toolset
        shell: pwsh
        run: |
          $base = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\2022\Enterprise\MSBuild\Microsoft\VC\v170\Platforms\x64\PlatformToolsets"
          $toolset = ""
          if (Test-Path (Join-Path $base "v145\Toolset.props")) {
            $toolset = "v145"
          } elseif (Test-Path (Join-Path $base "v143\Toolset.props")) {
            $toolset = "v143"
          }

          if ([string]::IsNullOrWhiteSpace($toolset)) {
            Write-Error "Supported toolset not found (expected v145 or v143)."
            exit 1
          }

          "value=$toolset" >> $env:GITHUB_OUTPUT
          Write-Host "Using DjvuPlatformToolset=$toolset"

      - name: Prepare third-party sources (jpeg/zlib/tiff)
        shell: pwsh
        run: |
          $winRoot = Join-Path $env:GITHUB_WORKSPACE "windows"
          $tmpRoot = $env:RUNNER_TEMP

          $jpegDir = Join-Path $winRoot "jpeg\\jpeg-6b"
          if (-not (Test-Path $jpegDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "jpeg") | Out-Null
            $jpegTar = Join-Path $tmpRoot "jpegsrc.v6b.tar.gz"
            Invoke-WebRequest -Uri "https://www.ijg.org/files/jpegsrc.v6b.tar.gz" -OutFile $jpegTar
            tar -xzf $jpegTar -C (Join-Path $winRoot "jpeg")
          }

          $zlibDir = Join-Path $winRoot "zlib\\zlib"
          if (-not (Test-Path $zlibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "zlib") | Out-Null
            $zlibTar = Join-Path $tmpRoot "zlib-1.2.13.tar.gz"
            Invoke-WebRequest -Uri "https://zlib.net/fossils/zlib-1.2.13.tar.gz" -OutFile $zlibTar
            tar -xzf $zlibTar -C (Join-Path $winRoot "zlib")
            if (Test-Path (Join-Path $winRoot "zlib\\zlib-1.2.13")) {
              Move-Item -Force (Join-Path $winRoot "zlib\\zlib-1.2.13") $zlibDir
            }
          }

          $tiffLibDir = Join-Path $winRoot "tiff\\tiff\\libtiff"
          if (-not (Test-Path $tiffLibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "tiff") | Out-Null
            $tiffTar = Join-Path $tmpRoot "tiff-4.0.10.tar.gz"
            Invoke-WebRequest -Uri "https://download.osgeo.org/libtiff/tiff-4.0.10.tar.gz" -OutFile $tiffTar
            tar -xzf $tiffTar -C (Join-Path $winRoot "tiff")
            if (Test-Path (Join-Path $winRoot "tiff\\tiff-4.0.10")) {
              Move-Item -Force (Join-Path $winRoot "tiff\\tiff-4.0.10") (Join-Path $winRoot "tiff\\tiff")
            }
          }

      - name: Build (Release x64)
        shell: pwsh
        run: |
          msbuild windows\djvulibre\djvulibre.sln `
            /m `
            /t:libdjvulibre `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=${{ steps.toolset.outputs.value }} `
            /p:DjvuPlatformToolset=${{ steps.toolset.outputs.value }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: djvulibre-windows-Release-x64
          path: |
            windows/build/Release/x64/libdjvulibre.dll
            windows/build/Release/x64/libdjvulibre.lib
            windows/build/Release/x64/libjpeg.dll
          if-no-files-found: error

  build_manual:
    name: Manual ${{ matrix.config }} x64
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Release
          - config: Debug

    steps:
      - name: Select mode
        id: mode
        shell: pwsh
        run: |
          $mode = '${{ github.event.inputs.mode }}'
          $config = '${{ matrix.config }}'
          $run = $false
          if ($mode -eq 'both') {
            $run = $true
          } elseif ($mode -eq 'x64-release' -and $config -eq 'Release') {
            $run = $true
          } elseif ($mode -eq 'x64-debug' -and $config -eq 'Debug') {
            $run = $true
          }
          "run=$($run.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Checkout
        if: ${{ steps.mode.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Setup MSBuild
        if: ${{ steps.mode.outputs.run == 'true' }}
        uses: microsoft/setup-msbuild@v2

      - name: Detect MSVC toolset
        if: ${{ steps.mode.outputs.run == 'true' }}
        id: toolset
        shell: pwsh
        run: |
          $base = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\2022\Enterprise\MSBuild\Microsoft\VC\v170\Platforms\x64\PlatformToolsets"
          $toolset = ""
          if (Test-Path (Join-Path $base "v145\Toolset.props")) {
            $toolset = "v145"
          } elseif (Test-Path (Join-Path $base "v143\Toolset.props")) {
            $toolset = "v143"
          }

          if ([string]::IsNullOrWhiteSpace($toolset)) {
            Write-Error "Supported toolset not found (expected v145 or v143)."
            exit 1
          }

          "value=$toolset" >> $env:GITHUB_OUTPUT
          Write-Host "Using DjvuPlatformToolset=$toolset"

      - name: Prepare third-party sources (jpeg/zlib/tiff)
        if: ${{ steps.mode.outputs.run == 'true' }}
        shell: pwsh
        run: |
          $winRoot = Join-Path $env:GITHUB_WORKSPACE "windows"
          $tmpRoot = $env:RUNNER_TEMP

          $jpegDir = Join-Path $winRoot "jpeg\\jpeg-6b"
          if (-not (Test-Path $jpegDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "jpeg") | Out-Null
            $jpegTar = Join-Path $tmpRoot "jpegsrc.v6b.tar.gz"
            Invoke-WebRequest -Uri "https://www.ijg.org/files/jpegsrc.v6b.tar.gz" -OutFile $jpegTar
            tar -xzf $jpegTar -C (Join-Path $winRoot "jpeg")
          }

          $zlibDir = Join-Path $winRoot "zlib\\zlib"
          if (-not (Test-Path $zlibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "zlib") | Out-Null
            $zlibTar = Join-Path $tmpRoot "zlib-1.2.13.tar.gz"
            Invoke-WebRequest -Uri "https://zlib.net/fossils/zlib-1.2.13.tar.gz" -OutFile $zlibTar
            tar -xzf $zlibTar -C (Join-Path $winRoot "zlib")
            if (Test-Path (Join-Path $winRoot "zlib\\zlib-1.2.13")) {
              Move-Item -Force (Join-Path $winRoot "zlib\\zlib-1.2.13") $zlibDir
            }
          }

          $tiffLibDir = Join-Path $winRoot "tiff\\tiff\\libtiff"
          if (-not (Test-Path $tiffLibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "tiff") | Out-Null
            $tiffTar = Join-Path $tmpRoot "tiff-4.0.10.tar.gz"
            Invoke-WebRequest -Uri "https://download.osgeo.org/libtiff/tiff-4.0.10.tar.gz" -OutFile $tiffTar
            tar -xzf $tiffTar -C (Join-Path $winRoot "tiff")
            if (Test-Path (Join-Path $winRoot "tiff\\tiff-4.0.10")) {
              Move-Item -Force (Join-Path $winRoot "tiff\\tiff-4.0.10") (Join-Path $winRoot "tiff\\tiff")
            }
          }

      - name: Build (${{ matrix.config }} x64)
        if: ${{ steps.mode.outputs.run == 'true' }}
        shell: pwsh
        run: |
          msbuild windows\djvulibre\djvulibre.sln `
            /m `
            /t:libdjvulibre `
            /p:Configuration=${{ matrix.config }} `
            /p:Platform=x64 `
            /p:PlatformToolset=${{ steps.toolset.outputs.value }} `
            /p:DjvuPlatformToolset=${{ steps.toolset.outputs.value }}

      - name: Upload artifact
        if: ${{ steps.mode.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: djvulibre-windows-${{ matrix.config }}-x64
          path: |
            windows/build/${{ matrix.config }}/x64/libdjvulibre.dll
            windows/build/${{ matrix.config }}/x64/libdjvulibre.lib
            windows/build/${{ matrix.config }}/x64/libjpeg.dll
          if-no-files-found: error
