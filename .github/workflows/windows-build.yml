name: Windows Build

on:
  push:
    branches:
      - develop
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build_pr:
    name: ${{ matrix.config }} x64
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - Release
          - Debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test with CMake
        shell: pwsh
        run: |
          .\run_windows_tests.ps1 -Configuration ${{ matrix.config }} -Platform x64 -Toolset auto

      - name: Upload binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: djvulibre-windows-${{ matrix.config }}-x64
          path: |
            build-windows/bin/${{ matrix.config }}/libdjvulibre.dll
            build-windows/lib/${{ matrix.config }}/libdjvulibre.lib
            build-windows/bin/${{ matrix.config }}/*.exe
          if-no-files-found: ignore
