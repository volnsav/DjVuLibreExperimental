name: CI Manual

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: false
        default: both
        type: choice
        options: [linux, windows, both]
      build_type:
        description: "Build type"
        required: false
        default: Release
        type: choice
        options: [Release, Debug]
      enable_gtest:
        description: "Enable GoogleTest unit tests"
        required: false
        default: true
        type: boolean
      package:
        description: "Generate CPack package (Windows only)"
        required: false
        default: false
        type: boolean

jobs:
  # -----------------------------------------------------------------------
  linux:
    name: Linux ${{ inputs.build_type }}
    if: inputs.platform == 'linux' || inputs.platform == 'both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          pkgs="cmake ninja-build pkg-config g++ libjpeg-dev libtiff-dev zlib1g-dev"
          if [ "${{ inputs.enable_gtest }}" = "true" ]; then
            pkgs="$pkgs libgtest-dev"
          fi
          sudo apt-get install -y $pkgs

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }}
          -DDJVULIBRE_USE_BUNDLED_DEPS=OFF
          -DDJVULIBRE_ENABLE_GTEST=${{ inputs.enable_gtest && 'ON' || 'OFF' }}
          -DDJVULIBRE_ENABLE_XMLTOOLS=ON
          -DDJVULIBRE_ENABLE_DESKTOPFILES=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-manual-${{ inputs.build_type }}-logs
          path: build/Testing/
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  windows:
    name: Windows ${{ inputs.build_type }}
    if: inputs.platform == 'windows' || inputs.platform == 'both'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DDJVULIBRE_USE_BUNDLED_DEPS=ON
          -DDJVULIBRE_ENABLE_GTEST=${{ inputs.enable_gtest && 'ON' || 'OFF' }}
          -DDJVULIBRE_ENABLE_XMLTOOLS=ON
          -DDJVULIBRE_ENABLE_DESKTOPFILES=OFF

      - name: Build
        run: cmake --build build --config ${{ inputs.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ inputs.build_type }} --output-on-failure

      - name: Package
        if: inputs.package
        run: cpack --config build/CPackConfig.cmake -C ${{ inputs.build_type }} -G ZIP

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-manual-${{ inputs.build_type }}-artifacts
          path: |
            build/bin/${{ inputs.build_type }}/*.dll
            build/bin/${{ inputs.build_type }}/*.exe
            build/lib/${{ inputs.build_type }}/*.lib
            build/*.zip
          if-no-files-found: ignore
